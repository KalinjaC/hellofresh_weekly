name: Generate HellFresh Weekly Page

on:
  schedule:
    - cron: '0 7 * * 6'   # Samedi 09:00 heure de Paris (UTC+2 été / UTC+1 hiver)
  workflow_dispatch:        # Déclenchement manuel depuis l'UI GitHub

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Generate page
        run: python src/generate_page.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          commit_message: "chore: update weekly menu [skip ci]"
          force_orphan: false
